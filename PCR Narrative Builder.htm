let _foundFocusIdx = -1;

function foundFilter(fieldId) {
  const input = document.getElementById(`f_${fieldId}`);
  const drop  = document.getElementById(`founddrop_${fieldId}`);
  const query = input.value.trim().toLowerCase();
  _foundFocusIdx = -1;

  const matches = query
    ? PATIENT_FOUND_LIST.filter(p => p.toLowerCase().includes(query))
    : PATIENT_FOUND_LIST;

  if (!matches.length) { drop.innerHTML = ''; drop.classList.remove('open'); return; }

  drop.innerHTML = matches.map((p, i) => {
    const label = query
      ? p.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
          '<span class="hosp-match">$1</span>')
      : p;
    return `<div class="hosp-option" data-val="${p}" data-idx="${i}"
      onmousedown="foundPick('${fieldId}', this.dataset.val)">${label}</div>`;
  }).join('');
  drop.classList.add('open');
}

function foundPick(fieldId, value) {
  document.getElementById(`f_${fieldId}`).value = value;
  document.getElementById(`founddrop_${fieldId}`).classList.remove('open');
  _foundFocusIdx = -1;
}

function foundBlur(fieldId) {
  setTimeout(() => {
    const drop = document.getElementById(`founddrop_${fieldId}`);
    if (drop) drop.classList.remove('open');
    _foundFocusIdx = -1;
  }, 150);
}

function foundKeydown(e, fieldId) {
  const drop = document.getElementById(`founddrop_${fieldId}`);
  const options = drop ? Array.from(drop.querySelectorAll('.hosp-option')) : [];
  if (!options.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _foundFocusIdx = Math.min(_foundFocusIdx + 1, options.length - 1);
    options.forEach((o, i) => o.classList.toggle('hosp-focused', i === _foundFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _foundFocusIdx = Math.max(_foundFocusIdx - 1, 0);
    options.forEach((o, i) => o.classList.toggle('hosp-focused', i === _foundFocusIdx));
  } else if (e.key === 'Enter' && _foundFocusIdx >= 0) {
    e.preventDefault();
    foundPick(fieldId, options[_foundFocusIdx].dataset.val);
  } else if (e.key === 'Escape') {
    drop.classList.remove('open');
  }
}

function setServiceLevel(level) {
  const input = document.getElementById('f_service_level');
  if (input) input.value = level;
  if (!state.data.dispatch) state.data.dispatch = {};
  state.data.dispatch.service_level = level;

  const banner = document.getElementById('als_bls_banner');
  if (banner) {
    const [alsBtn, blsBtn] = banner.querySelectorAll('.als-bls-btn');
    alsBtn.classList.toggle('als-active', level === 'als');
    blsBtn.classList.toggle('bls-active', level === 'bls');
    banner.classList.toggle('bls-mode', level === 'bls');
  }

  BLS_AUTO_STEPS.forEach(stepId => {
    if (!state.data[stepId]) state.data[stepId] = {};
    BLS_AUTO_FIELDS.forEach(fieldId => {
      if (level === 'bls') {
        state.data[stepId][fieldId] = 'up';
      } else {
        // Only clear if still at the auto-preset value
        if (state.data[stepId][fieldId] === 'up') delete state.data[stepId][fieldId];
      }
    });
  });

  const currentStepId = STEPS[state.current]?.id;
  if (BLS_AUTO_STEPS.includes(currentStepId)) renderStep(state.current);
}

function getServiceLevel() {
  return (state.data.dispatch || {}).service_level || 'als';
}

function addUnit() {
  const container = document.getElementById('units_container');
  const rows = container.querySelectorAll('.unit-row');
  const lastAdd = container.querySelector('#unit_add_btn');
  if (lastAdd) lastAdd.remove();
  const idx = rows.length;
  const opts = UNIT_TYPES.map(t => `<option value="${t}">${t}</option>`).join('');
  const div = document.createElement('div');
  div.className = 'unit-row';
  div.id = `unit_row_${idx}`;
  div.innerHTML = `<select class="unit-type-select" onchange="syncUnits()">${opts}</select>
    <input type="text" class="unit-num-input" placeholder="e.g. 24" value="" oninput="syncUnits()">
    <button type="button" class="unit-remove-btn" onclick="removeUnit(${idx})">×</button>
    <button type="button" class="unit-add-btn" id="unit_add_btn" onclick="addUnit()">+</button>`;
  container.appendChild(div);
  div.querySelector('input').focus();
}

function removeUnit(idx) {
  const row = document.getElementById(`unit_row_${idx}`);
  if (!row) return;
  const hadAddBtn = !!row.querySelector('#unit_add_btn');
  row.remove();
  const container = document.getElementById('units_container');
  const rows = container.querySelectorAll('.unit-row');
  rows.forEach((r, i) => {
    r.id = `unit_row_${i}`;
    const rmBtn = r.querySelector('.unit-remove-btn');
    if (rmBtn) rmBtn.setAttribute('onclick', `removeUnit(${i})`);
  });
  if (hadAddBtn && rows.length > 0) {
    const lastRow = rows[rows.length - 1];
    if (!lastRow.querySelector('#unit_add_btn')) {
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'unit-add-btn'; btn.id = 'unit_add_btn';
      btn.textContent = '+'; btn.setAttribute('onclick', 'addUnit()');
      lastRow.appendChild(btn);
    }
  }
  syncUnits();
}

function toggleVitalDone(fieldId) {
  const inp = document.getElementById(`f_${fieldId}_done`);
  if (!inp) return;
  const next = inp.value === 'yes' ? '' : 'yes';
  inp.value = next;
  const box = document.getElementById(`vcb_${fieldId}`);
  if (box) { box.classList.toggle('on', next === 'yes'); box.textContent = next === 'yes' ? '✓' : ''; }
}
function collectStep(idx) {
  const step = STEPS[idx];
  const data = {};
  for (const f of step.fields) {
    if (f.type === 'header' || f.type === 'section') continue;
    if (f.type === 'step_toggle') { data[f.id] = document.getElementById(`f_${f.id}`)?.value || 'no'; continue; }
    const el = document.getElementById(`f_${f.id}`);
    if (el) data[f.id] = el.value.trim();
    if (f.checkbox) {
      const doneEl = document.getElementById(`f_${f.id}_done`);
      if (doneEl) data[`${f.id}_done`] = doneEl.value;
    }
  }
  return data;
}

function goToStep(idx) {
  if (state.view === 'review' || state.view === 'narrative') {
    state.view = 'steps';
  } else {
    state.data[STEPS[state.current].id] = collectStep(state.current);
  }
  state.current = idx;
  renderProgressBar();
  renderStep(state.current);
}

function goNext(idx) {
  const step = STEPS[idx];
  const data = collectStep(idx);
  const missing = step.fields.filter(f => {
    if (!f.required || data[f.id]) return false;
    const el = document.getElementById(`f_${f.id}`);
    if (!el) return false;
    // For type="hidden" inputs (units, quickselect, etc.) check the parent field container's visibility
    const visEl = el.type === 'hidden' ? (el.closest('.field') || el.parentElement) : el;
    return visEl && visEl.offsetParent !== null;
  });
  if (missing.length) {
    missing.forEach(f => {
      const el = document.getElementById(`f_${f.id}`);
      if (!el) return;
      if (el.type === 'hidden') {
        const field = el.closest('.field');
        if (!field) return;
        const visInput = field.querySelector('input:not([type="hidden"]), textarea');
        const btnGroup = field.querySelector('.thumbs-group, .yesno-group');
        if (visInput) { visInput.style.borderColor = 'var(--red)'; visInput.focus(); }
        else if (btnGroup) { btnGroup.style.outline = '2px solid var(--red)'; btnGroup.style.borderRadius = '8px'; }
      } else {
        el.style.borderColor = 'var(--red)'; el.focus();
      }
    });
    return;
  }
  state.data[step.id] = data;
  delete state.skipped[step.id];
  const hidden = getHiddenSteps();
  let nextIdx = idx + 1;
  while (nextIdx < STEPS.length && hidden.includes(STEPS[nextIdx].id)) nextIdx++;
  if (nextIdx >= STEPS.length) { state.view = 'review'; renderReview(); }
  else { state.current = nextIdx; renderProgressBar(); renderStep(state.current); }
}

function goBack() {
  if (state.view === 'review' || state.view === 'narrative') {
    state.view = 'steps';
    const hidden = getHiddenSteps();
    let backIdx = STEPS.length - 1;
    while (backIdx >= 0 && hidden.includes(STEPS[backIdx].id)) backIdx--;
    state.current = Math.max(0, backIdx);
    renderProgressBar(); renderStep(state.current); return;
  }
  if (state.current > 0) {
    state.data[STEPS[state.current].id] = collectStep(state.current);
    const hidden = getHiddenSteps();
    let prevIdx = state.current - 1;
    while (prevIdx > 0 && hidden.includes(STEPS[prevIdx].id)) prevIdx--;
    state.current = prevIdx;
    renderProgressBar(); renderStep(state.current);
  }
}

function skipStep(idx) {
  state.skipped[STEPS[idx].id] = true;
  state.data[STEPS[idx].id] = {};
  if (idx === STEPS.length - 1) { state.view = 'review'; renderReview(); }
  else { state.current = idx + 1; renderProgressBar(); renderStep(state.current); }
}

// ── Review ───────────────────────────────────────────────────

function renderReview() {
  renderProgressBar();
  const sections = STEPS.map((step, si) => {
    const isSkipped = state.skipped[step.id];
    const d = state.data[step.id] || {};
    let rows = '';
    if (!isSkipped) {
      for (const f of step.fields) {
        if (f.type === 'header' || f.type === 'vital') continue;
        const val = d[f.id];
        if (val && val !== '— select —') {
          rows += `<div class="review-field"><span class="review-label">${f.label || f.id}</span><span class="review-value">${val}</span></div>`;
        }
      }
      // Vitals inline
      const vitalFields = step.fields.filter(f => f.type === 'vital');
      const vitalPairs = vitalFields.map(f => d[f.id] ? `${f.label} ${d[f.id]}` : '').filter(Boolean);
      if (vitalPairs.length) rows += `<div class="review-field"><span class="review-label">Vital Signs</span><span class="review-value">${vitalPairs.join(', ')}</span></div>`;
    }
    return `<div class="review-section">
      <div class="review-section-header">
        <h3>${step.label}</h3>
        <div style="display:flex;align-items:center;gap:8px">
          ${isSkipped ? '<span class="skipped-tag">Skipped</span>' : ''}
          <button class="btn-edit" onclick="editStep(${si})">Edit</button>
        </div>
      </div>
      <div class="review-body">${isSkipped
        ? '<span style="color:var(--gray-500);font-size:0.83rem;font-style:italic">Section skipped.</span>'
        : (rows || '<span style="color:var(--gray-500);font-size:0.83rem;font-style:italic">No data entered.</span>')
      }</div>
    </div>`;
  }).join('');

  document.getElementById('stepContainer').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="step-icon" style="background:var(--green-pale);color:var(--green)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div><h2>Review Your Report</h2><p>Edit any section before generating the narrative.</p></div>
      </div>
      ${sections}
      <div class="btn-row" style="margin-top:20px">
        <button class="btn btn-secondary" onclick="goBack()">← Back</button>
        <button class="btn btn-green btn-lg" onclick="generateNarrative()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Generate Narrative
        </button>
      </div>
    </div>`;
}

function editStep(idx) {
  state.view = 'steps'; state.current = idx;
  renderProgressBar(); renderStep(idx);
}

// ── Helpers ───────────────────────────────────────────────────

function v(stepId, fieldId) { return (state.data[stepId] || {})[fieldId] || ''; }
function skip(stepId) { return !!state.skipped[stepId] || getHiddenSteps().includes(stepId); }

// Ensure text ends with a single period
function dot(text) {
  text = (text || '').trim().replace(/\.+$/, '');
  return text ? text + '.' : '';
}

// Expand "55f", "47m", "55 y/o M", "55 YOM", "55 YO F" etc. → "55 year old male/female"
function normalizePatient(raw) {
  if (!raw) return raw;
  const s = raw.trim();
  // "55f" / "47m" shorthand
  const short = s.match(/^(\d+)\s*([mf])$/i);
  if (short) {
    const gender = short[2].toLowerCase() === 'm' ? 'year old male' : 'year old female';
    return `${short[1]} ${gender}`;
  }
  // "55 y/o M" / "55 YOM" / "55 YO F"
  const long = s.match(/^(\d+)\s*y\/?o\s*([mf])$/i);
  if (long) {
    const gender = long[2].toLowerCase() === 'm' ? 'year old male' : 'year old female';
    return `${long[1]} ${gender}`;
  }
  return s;
}

// Build vitals string from a step's data
function vitalsStr(stepId) {
  const parts = [
    v(stepId,'hr')   && `HR ${v(stepId,'hr')}`,
    v(stepId,'bp')   && `BP ${v(stepId,'bp')}`,
    v(stepId,'rr')   && `RR ${v(stepId,'rr')}`,
    v(stepId,'spo2') && `SpO₂ ${v(stepId,'spo2')}%`,
    v(stepId,'bgl')  && `BGL ${v(stepId,'bgl')}`,
    v(stepId,'temp') && `temp ${v(stepId,'temp')}°`,
  ].filter(Boolean);
  return parts.join(', ');
}

// ── Narrative Generation ──────────────────────────────────────

function generateNarrative() {
  const paras = [];

  // ── Para 1: Dispatch ──
  if (!skip('dispatch')) {
    let unitArr = [];
    try { unitArr = JSON.parse(v('dispatch','unit') || '[]'); } catch(e) { unitArr = [v('dispatch','unit')]; }
    unitArr = unitArr.filter(Boolean);
    const unit    = unitArr.length > 1
      ? unitArr.slice(0,-1).join(', ') + ' and ' + unitArr[unitArr.length-1]
      : (unitArr[0] || 'EMS');
    const patient = normalizePatient(v('dispatch','patient'));
    const dispCC  = v('dispatch','dispatch_complaint');

    let line = `${unit} was dispatched to`;
    if (patient) line += ` a ${patient} patient`;
    if (dispCC)  line += ` for ${dispCC}`;
    paras.push(dot(line));
  }

  // ── Para 2: Scene ──
  if (!skip('scene')) {
    const found = v('scene','patient_found');
    const notes = v('scene','scene_notes');
    const moi   = v('scene','moi_noi');
    const bits  = [];
    if (found) bits.push(`the patient was found ${found}`);
    if (notes) bits.push(notes);
    if (bits.length) paras.push(dot('On arrival, ' + bits.join('; ')));
  }

  // ── Para 2: Initial Assessment + On-Scene Interventions + Stretcher ──
  if (!skip('primary_assessment')) {
    const sentences = [];

    // Mental status / GCS
    const ms  = v('primary_assessment','mental_status');
    const gcs = v('primary_assessment','gcs');
    if (ms || gcs) {
      let line = 'On examination, the patient was';
      if (ms)  line += ` ${ms.toLowerCase()}`;
      if (gcs) line += `; GCS ${gcs}`;
      sentences.push(dot(line));
    }

    // ABCs
    const abcsOk    = v('primary_assessment','abcs_ok');
    const abcsNotes = v('primary_assessment','abcs').replace(/\.+$/, '');
    const abcsRx    = v('primary_assessment','abcs_interventions').replace(/\.+$/, '');
    const abcsPR    = v('primary_assessment','abcs_pt_response');
    if (abcsOk === 'down' && abcsNotes) {
      sentences.push(dot(`Assessment of ABCs revealed ${abcsNotes}`));
    } else if (abcsOk === 'up') {
      sentences.push('ABCs were assessed and did not reveal any immediate life threats.');
    }
    if (abcsRx)                sentences.push(dot(abcsRx));
    if (abcsPR)                sentences.push(dot(abcsPR));

    // Vitals
    const vStr       = vitalsStr('primary_assessment');
    const lungSounds = v('primary_assessment','lung_sounds');
    const ekgRhythm  = v('primary_assessment','ekg');
    const ekg12Lead  = v('primary_assessment','ekg_12lead');
    const bglDone    = v('primary_assessment','bgl_done');
    const ekgDone    = v('primary_assessment','ekg_done');
    const ekg12Done  = v('primary_assessment','ekg_12lead_done');
    const painScale  = v('primary_assessment','pain');
    const pupilsVal  = v('primary_assessment','pupils');
    const vitalsRx   = v('primary_assessment','vitals_interventions').replace(/\.+$/, '');
    const vitalsPR   = v('primary_assessment','vitals_pt_response');
    const vitalParts = [
      vStr,
      lungSounds && `lung sounds ${lungSounds.toLowerCase()}`,
      ekgRhythm  && `4 lead EKG ${ekgRhythm.toLowerCase()}`,
      ekg12Lead  && `12 lead EKG ${ekg12Lead.toLowerCase()}`,
      painScale  && `pain ${painScale}`,
      pupilsVal  && `pupils ${pupilsVal.toLowerCase()}`,
    ].filter(Boolean);
    sentences.push(vitalParts.length
      ? dot(`Vital signs were assessed which revealed ${vitalParts.join(', ')}`)
      : 'Vital signs were assessed without life-threatening abnormalities.');
    if (!v('primary_assessment','bgl') && bglDone === 'yes') sentences.push('Blood glucose was taken.');
    if (!ekgRhythm && ekgDone === 'yes') sentences.push('4 Lead EKG was taken.');
    if (!ekg12Lead && ekg12Done === 'yes') sentences.push('12 Lead EKG was taken.');
    if (vitalsRx) sentences.push(dot(vitalsRx));
    if (vitalsPR) sentences.push(dot(vitalsPR));

    // History — SAMPLE / OPQRST
    const opqrstPresent = v('primary_assessment','opqrst_present');
    const opqrst = v('primary_assessment','opqrst').replace(/\.+$/, '');
    const sample = v('primary_assessment','sample').replace(/\.+$/, '');
    if (opqrstPresent === 'no') {
      sentences.push(sample
        ? dot(`A SAMPLE history was obtained which revealed ${sample}`)
        : 'A SAMPLE history was obtained.');
    } else if (opqrstPresent === 'yes') {
      const sP = sample
        ? dot(`A SAMPLE history was obtained which revealed ${sample}`)
        : 'A SAMPLE history was obtained.';
      const oP = opqrst
        ? dot(`An OPQRST history was completed which revealed ${opqrst}`)
        : 'An OPQRST history was completed.';
      sentences.push(`${sP} ${oP}`);
    }

    // Pertinent negatives
    const pertNeg = v('primary_assessment','pertinent_negatives').replace(/\.+$/, '');
    if (pertNeg) sentences.push(dot(`The patient denied ${pertNeg}`));

    // Physical assessment
    const assType  = v('primary_assessment','assessment_type') || 'focused assessment';
    const assNotes = v('primary_assessment','assessment_notes').replace(/\.+$/, '');
    const assRx    = v('primary_assessment','assessment_interventions').replace(/\.+$/, '');
    const assPR    = v('primary_assessment','assessment_pt_response');
    sentences.push(assNotes
      ? dot(`A ${assType.toLowerCase()} was performed which revealed ${assNotes}`)
      : dot(`A ${assType.toLowerCase()} was performed which did not reveal any DCAP-BTLS`));
    if (assRx) sentences.push(dot(assRx));
    if (assPR) sentences.push(dot(assPR));

    // Medical alerts
    let alertData = {};
    try { alertData = JSON.parse(v('primary_assessment','alerts') || '{}'); } catch(e) {}
    if (alertData.stroke?.active) {
      const sk = alertData.stroke;
      const scales = sk.scales || ['fast-ed'];
      const scaleResults = [];
      if (scales.includes('fast-ed')) {
        const normals = { fe_face:'Normal', fe_arm:'No drift', fe_speech:'Normal', fe_time:'Unknown', fe_eyes:'None', fe_denial:'Absent' };
        const labels  = { fe_face:'facial droop', fe_arm:'arm strength', fe_speech:'speech', fe_time:'last known well', fe_eyes:'eyes deviation', fe_denial:'denial/neglect' };
        const abn = Object.keys(normals).filter(k => sk[k] && sk[k] !== normals[k]);
        const parts = abn.map(k => `${labels[k]}: ${sk[k]}`);
        scaleResults.push(parts.length ? `FAST-ED revealed ${parts.join('; ')}` : 'FAST-ED within normal limits');
      }
      if (scales.includes('cincinnati')) {
        const normals = { ci_face:'Normal', ci_arm:'No drift', ci_speech:'Normal' };
        const labels  = { ci_face:'facial droop', ci_arm:'arm drift', ci_speech:'speech' };
        const abn = Object.keys(normals).filter(k => sk[k] && sk[k] !== normals[k]);
        const parts = abn.map(k => `${labels[k]}: ${sk[k]}`);
        scaleResults.push(parts.length ? `Cincinnati revealed ${parts.join('; ')}` : 'Cincinnati within normal limits');
      }
      const alertCalled = sk.alert_called === 'yes' ? ' A stroke alert was activated.' : sk.alert_called === 'no' ? ' Stroke alert was not called.' : '';
      sentences.push(dot(`Stroke assessment performed — ${scaleResults.join('; ')}`) + alertCalled);
    }
    if (alertData.trauma?.active) {
      sentences.push('A trauma alert was activated.');
    }
    // Pediatric trauma criteria findings
    if (!skip('trauma_criteria')) {
      const tc = state.data.trauma_criteria || {};
      if (tc.trauma_type === 'pediatric' && tc.ped_criteria) {
        let pc = {}; try { pc = JSON.parse(tc.ped_criteria); } catch(e) {}
        const checked = pc.checked || [];
        const allItems = PED_TRAUMA.scorecard.flatMap(c => c.items).concat(PED_TRAUMA.or2);
        const hitItems = allItems.filter(it => checked.includes(it.id));
        if (hitItems.length) {
          const byComp = PED_TRAUMA.scorecard.map(comp => {
            const hits = comp.items.filter(it => checked.includes(it.id));
            return hits.length ? `${comp.label.toLowerCase()}: ${hits.map(i => i.text.toLowerCase()).join(', ')}` : null;
          }).filter(Boolean);
          const or2Hits = PED_TRAUMA.or2.filter(it => checked.includes(it.id)).map(it => it.text.toLowerCase());
          if (or2Hits.length) byComp.push(...or2Hits);
          const totalScore = PED_TRAUMA.scorecard.flatMap(c => c.items).filter(it => checked.includes(it.id)).reduce((sum, it) => sum + it.pts, 0);
          sentences.push(dot(`Pediatric trauma scorecard score of ${totalScore}: ${byComp.join('; ')}`));
        }
        const pcsTotal = PED_TRAUMA.pcs.reduce((s, cat) => s + (Number(pc[cat.id]) || 0), 0);
        if (pcsTotal > 0) {
          const pcsDetails = PED_TRAUMA.pcs.map(cat => {
            if (!pc[cat.id]) return null;
            const opt = cat.opts.find(o => String(o.v) === String(pc[cat.id]));
            return opt ? `${cat.label.toLowerCase()}: ${opt.t.toLowerCase()} (${opt.v})` : null;
          }).filter(Boolean);
          sentences.push(dot(`Pediatric Coma Scale (PCS) score ${pcsTotal}/15 — ${pcsDetails.join('; ')}`));
        }
      }
      if (tc.trauma_type === 'adult' && tc.adult_criteria) {
        let ac = {}; try { ac = JSON.parse(tc.adult_criteria); } catch(e) {}
        const checked = ac.checked || [];
        const allScItems = ADULT_TRAUMA.scorecard.flatMap(c => c.items);
        const hitItems = allScItems.filter(it => checked.includes(it.id));
        if (hitItems.length || ADULT_TRAUMA.or2.some(it => checked.includes(it.id)) || ADULT_TRAUMA.or3.some(it => checked.includes(it.id))) {
          const byComp = ADULT_TRAUMA.scorecard.map(comp => {
            const hits = comp.items.filter(it => checked.includes(it.id));
            return hits.length ? `${comp.label.replace(/\n/g,' ').toLowerCase()}: ${hits.map(i => i.text.toLowerCase()).join(', ')}` : null;
          }).filter(Boolean);
          const or2Hits = ADULT_TRAUMA.or2.filter(it => checked.includes(it.id)).map(it => it.text.toLowerCase());
          const or3Hits = ADULT_TRAUMA.or3.filter(it => checked.includes(it.id)).map(it => it.text.toLowerCase());
          if (or2Hits.length) byComp.push(...or2Hits);
          if (or3Hits.length) byComp.push(...or3Hits);
          const totalScore = allScItems.filter(it => checked.includes(it.id)).reduce((sum, it) => sum + it.pts, 0);
          sentences.push(dot(`Adult trauma scorecard score of ${totalScore}: ${byComp.join('; ')}`));
        }
        const gcsRaw = ADULT_TRAUMA.gcs.reduce((s, cat) => s + (Number(ac[cat.id]) || 0), 0);
        if (gcsRaw > 0) {
          const gcsDetails = ADULT_TRAUMA.gcs.map(cat => {
            if (!ac[cat.id]) return null;
            const opt = cat.opts.find(o => String(o.v) === String(ac[cat.id]));
            return opt ? `${cat.label.replace(/\n/g,' ').toLowerCase()}: ${opt.t.toLowerCase()} (${opt.v})` : null;
          }).filter(Boolean);
          sentences.push(dot(`Glasgow Coma Scale (GCS) score ${gcsRaw}/15 — ${gcsDetails.join('; ')}`));
        }
      }
    }
    if (alertData.sepsis?.active) {
      const parts = [];
      if (alertData.sepsis.etco2) parts.push(`ETCO₂ ${alertData.sepsis.etco2} mmHg`);
      if (alertData.sepsis.temp)  parts.push(`temp ${alertData.sepsis.temp}°`);
      if (alertData.sepsis.hr)    parts.push(`HR ${alertData.sepsis.hr}`);
      if (alertData.sepsis.rr)    parts.push(`RR ${alertData.sepsis.rr}`);
      sentences.push(parts.length
        ? dot(`Sepsis alert activated with criteria: ${parts.join(', ')}`)
        : 'A sepsis alert was activated.');
    }
    if (alertData.stemi?.active) {
      const leads     = alertData.stemi.leads     || [];
      const depressed = alertData.stemi.depressed || [];
      const parts = [];
      if (leads.length)     parts.push(`ST elevation noted in leads ${leads.join(', ')}`);
      if (depressed.length) parts.push(`ST depression noted in leads ${depressed.join(', ')}`);
      sentences.push(parts.length ? dot(`STEMI alert activated; ${parts.join('; ')}`) : 'A STEMI alert was activated.');
    }
    if (alertData.cardiac?.active) {
      const f = (alertData.cardiac.findings || '').replace(/\.+$/,'');
      sentences.push(f ? dot(`Cardiac alert activated: ${f}`) : 'A cardiac alert was activated.');
    }
    if (alertData.elder_gray?.active && !skip('elder_gray_criteria')) {
      const egRaw = state.data.elder_gray_criteria || {};
      let egChecked = [];
      try { egChecked = (JSON.parse(egRaw.elder_gray_data || '{}')).checked || []; } catch(e) {}
      const allEgItems = [...ELDER_GRAY_CRITERIA.left, ...ELDER_GRAY_CRITERIA.right].flatMap(s => s.items);
      const hitItems = allEgItems.filter(it => egChecked.includes(it.id));
      if (hitItems.length) {
        sentences.push(dot(`Elder Gray alert criteria met: ${hitItems.map(it => it.text.toLowerCase()).join('; ')}`));
      } else {
        sentences.push('An Elder Gray alert was activated.');
      }
    }

    // Stretcher movement
    const sceneDisp     = v('scene','disposition');
    const isTransported = !sceneDisp || sceneDisp === 'Transported by EMS';
    const stretcher     = v('primary_assessment','stretcher_movement');
    if (isTransported && stretcher) {
      sentences.push(
        stretcher.toLowerCase() === 'self-ambulatory'
          ? `The patient was able to self-ambulate to the stretcher without incident, secured with 2 straps, and moved to the back of the rescue.`
          : stretcher.toLowerCase() === 'walk-assisted'
          ? `The patient was walk-assisted to the stretcher without incident, secured with 2 straps, and moved to the back of the rescue.`
          : `The patient was moved to the stretcher via ${stretcher.toLowerCase()} without incident, secured with 2 straps, and moved to the back of the rescue.`
      );
    }

    if (sentences.length) paras.push(sentences.join(' '));
  }

  // ── Para 3: En Route Reassessment ──
  if (!skip('secondary_assessment')) {
    const sentences = [];

    const ms2  = v('secondary_assessment','mental_status') || v('primary_assessment','mental_status');
    const gcs2 = v('secondary_assessment','gcs') || v('primary_assessment','gcs');

    let reaLine = 'En route reassessment';
    if (ms2) {
      reaLine += `: the patient remained ${ms2.toLowerCase()}`;
      if (gcs2) reaLine += `; GCS ${gcs2}`;
    }
    sentences.push(dot(reaLine));

    // Secondary ABCs
    const abcs2Ok    = v('secondary_assessment','abcs_ok');
    const abcs2Notes = v('secondary_assessment','abcs').replace(/\.+$/, '');
    const abcs2Rx    = v('secondary_assessment','abcs_interventions').replace(/\.+$/, '');
    const abcs2PR    = v('secondary_assessment','abcs_pt_response');
    if (abcs2Ok === 'down' && abcs2Notes) {
      sentences.push(dot(`ABCs reassessment revealed ${abcs2Notes}`));
    } else {
      sentences.push('ABCs remained without life-threatening findings.');
    }
    if (abcs2Rx) sentences.push(dot(abcs2Rx));
    if (abcs2PR) sentences.push(dot(abcs2PR));

    // Secondary vitals
    const vStr2       = vitalsStr('secondary_assessment');
    const lungSounds2 = v('secondary_assessment','lung_sounds');
    const ekgRhythm2  = v('secondary_assessment','ekg');
    const ekg12Lead2  = v('secondary_assessment','ekg_12lead');
    const bglDone2    = v('secondary_assessment','bgl_done');
    const ekgDone2    = v('secondary_assessment','ekg_done');
    const ekg12Done2  = v('secondary_assessment','ekg_12lead_done');
    const painScale2  = v('secondary_assessment','pain');
    const pupilsVal2  = v('secondary_assessment','pupils');
    const vitals2Rx   = v('secondary_assessment','vitals_interventions').replace(/\.+$/, '');
    const vitals2PR   = v('secondary_assessment','vitals_pt_response');
    const vitalParts2 = [
      vStr2,
      lungSounds2 && `lung sounds ${lungSounds2.toLowerCase()}`,
      ekgRhythm2  && `4 lead EKG ${ekgRhythm2.toLowerCase()}`,
      ekg12Lead2  && `12 lead EKG ${ekg12Lead2.toLowerCase()}`,
      painScale2  && `pain ${painScale2}`,
      pupilsVal2  && `pupils ${pupilsVal2.toLowerCase()}`,
    ].filter(Boolean);
    sentences.push(vitalParts2.length
      ? dot(`Repeat vital signs were assessed which revealed ${vitalParts2.join(', ')}`)
      : 'Repeat vital signs remained stable.');
    if (!v('secondary_assessment','bgl') && bglDone2 === 'yes') sentences.push('Blood glucose was taken.');
    if (!ekgRhythm2 && ekgDone2 === 'yes') sentences.push('4 Lead EKG was taken.');
    if (!ekg12Lead2 && ekg12Done2 === 'yes') sentences.push('12 Lead EKG was taken.');
    if (vitals2Rx) sentences.push(dot(vitals2Rx));
    if (vitals2PR) sentences.push(dot(vitals2PR));

    // Extra vitals sets
    const extraVitalsList = (() => { try { return JSON.parse(v('secondary_assessment','extra_vitals_list') || '[]'); } catch(e) { return []; } })();
    extraVitalsList.forEach(ev => {
      const evParts = [
        ev.hr     && `HR ${ev.hr}`,
        ev.bp     && `BP ${ev.bp}`,
        ev.rr     && `RR ${ev.rr}`,
        ev.spo2   && `SpO₂ ${ev.spo2}%`,
        ev.bgl    && `BGL ${ev.bgl}`,
        ev.temp   && `temp ${ev.temp}°`,
        ev.lung_sounds && `lung sounds ${ev.lung_sounds.toLowerCase()}`,
        ev.ekg         && `4 lead EKG ${ev.ekg.toLowerCase()}`,
        ev.ekg_12lead  && `12 lead EKG ${ev.ekg_12lead.toLowerCase()}`,
        ev.pain   && `pain ${ev.pain}`,
        ev.pupils && `pupils ${ev.pupils.toLowerCase()}`,
      ].filter(Boolean);
      if (evParts.length) sentences.push(dot(`Repeat vital signs were assessed which revealed ${evParts.join(', ')}`));
      if (ev.interventions) sentences.push(dot(ev.interventions.replace(/\.+$/, '')));
      if (ev.pt_response)   sentences.push(dot(ev.pt_response));
    });

    // Secondary assessment
    const assType2  = v('secondary_assessment','assessment_type');
    const assNotes2 = v('secondary_assessment','assessment_notes').replace(/\.+$/, '');
    const assRx2    = v('secondary_assessment','assessment_interventions').replace(/\.+$/, '');
    const assPR2    = v('secondary_assessment','assessment_pt_response');
    if (assType2) {
      sentences.push(assNotes2
        ? dot(`A repeat ${assType2.toLowerCase()} revealed ${assNotes2}`)
        : dot(`A repeat ${assType2.toLowerCase()} revealed no new findings`));
      if (assRx2) sentences.push(dot(assRx2));
      if (assPR2) sentences.push(dot(assPR2));
    }

    // Additional notes
    const reaNotes = v('secondary_assessment','reassessment').replace(/\.+$/, '');
    if (reaNotes) sentences.push(dot(reaNotes));

    if (sentences.length) paras.push(sentences.join(' '));
  }

  // ── Para 4: Transport + Transfer of Care ──
  if (!skip('hospital')) {
    const sceneDisp = v('scene','disposition');
    const position    = v('hospital','transport_position');
    const facility    = v('hospital','receiving_facility');
    const staff       = v('hospital','receiving_staff');
    const bedTransfer = v('hospital','bed_transfer');

    if (sceneDisp && sceneDisp !== 'Transported by EMS') {
      paras.push(dot(sceneDisp));
    } else {
      const tParts = [];
      if (position) tParts.push(`in ${position.toLowerCase()} position`);
      if (facility)  tParts.push(`to ${facility}`);
      const transport = tParts.length
        ? dot(`The patient was transported ${tParts.join(', ')} without incident`)
        : 'The patient was transported without incident.';
      const handoff = staff
        ? `A verbal report was given to ${staff} upon arrival and care was transferred.`
        : 'Upon arrival, care was transferred to the receiving staff.';
      const bedLine = bedTransfer
        ? ` The patient was moved to the hospital bed via ${bedTransfer.toLowerCase()} without incident.`
        : '';
      paras.push(`${transport} ${handoff}${bedLine}`);
    }
  }

  // ── Cancelled disposition: placed back in service ──
  const finalDisp = v('scene', 'disposition');
  if (finalDisp === 'Cancelled en route' || finalDisp === 'Cancelled by TPD') {
    let unitArr = [];
    try { unitArr = JSON.parse(v('dispatch','unit') || '[]'); } catch(e) { unitArr = [v('dispatch','unit')]; }
    unitArr = unitArr.filter(Boolean);
    const unit = unitArr.length > 1
      ? unitArr.slice(0,-1).join(', ') + ' and ' + unitArr[unitArr.length-1]
      : (unitArr[0] || 'EMS');
    paras.push(dot(`${unit} placed back in service`));
  }

  renderNarrative(paras.join('\n\n'));
}

// ── Render Narrative ──────────────────────────────────────────

function renderNarrative(narrative) {
  state.view = 'narrative';
  renderProgressBar();
  const html = narrative.split('\n\n').map(p => `<p>${p}</p>`).join('');
  document.getElementById('stepContainer').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="step-icon" style="background:var(--green-pale);color:var(--green)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div><h2>Generated Narrative</h2><p>Copy this text directly into your report system.</p></div>
      </div>
      <div class="narrative-box" id="narrativeText">${html}</div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="copyNarrative()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy to Clipboard
        </button>
        <span class="copy-notice" id="copyNotice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Copied!
        </span>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-secondary" onclick="renderReview()">← Edit Report</button>
          <button class="btn btn-secondary" onclick="startOver()">New PCR</button>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <div class="step-icon" style="background:#f0f9ff;color:#0369a1">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <div><h2>Report System Coding</h2><p style="color:var(--gray-500);font-size:0.85rem">Based on chief complaint: <strong id="coding-cc" style="color:var(--blue)">${(state.data.scene||{}).moi_noi || '—'}</strong></p></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 0 8px">
        ${[1,2,3,4,5].map(n => `
        <div class="field" style="margin:0">
          <label style="font-size:0.8rem;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:0.04em">${n}</label>
          <select id="coding_field_${n}">
            <option value="">— select —</option>
          </select>
        </div>`).join('')}
      </div>
    </div>`;
}

function copyNarrative() {
  const el = document.getElementById('narrativeText');
  const text = el ? el.innerText : '';
  const notice = document.getElementById('copyNotice');
  const show = () => { notice.classList.add('show'); setTimeout(() => notice.classList.remove('show'), 2500); };
  navigator.clipboard.writeText(text).then(show).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); show();
  });
}

function startOver() {
  if (!confirm('Start a new PCR? All current data will be cleared.')) return;
  state = { current: 0, data: {}, skipped: {}, view: 'steps' };
  renderProgressBar(); renderStep(0);
}
